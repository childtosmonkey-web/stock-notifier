<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Notifier</title>
  <link rel="manifest" href="/web/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-6" x-data="app()" x-init="init()">

  <div class="max-w-md mx-auto space-y-6">

    <!-- 株価詳細カード（通知タップ時） -->
    <div x-show="stockDetail" class="bg-gray-800 rounded-xl p-5 space-y-4">
      <div class="flex items-baseline justify-between">
        <h2 class="text-2xl font-bold font-mono" x-text="stockDetail?.ticker"></h2>
        <button @click="stockDetail = null" class="text-gray-500 hover:text-gray-300 text-xl">✕</button>
      </div>
      <div class="flex items-baseline gap-4">
        <span class="text-3xl font-bold" x-text="stockDetail ? '$' + Number(stockDetail.price).toFixed(2) : ''"></span>
        <span class="text-lg font-semibold"
          :class="Number(stockDetail?.change_pct) >= 0 ? 'text-green-400' : 'text-red-400'"
          x-text="stockDetail ? (Number(stockDetail.change_pct) >= 0 ? '▲' : '▼') + Math.abs(Number(stockDetail.change_pct)).toFixed(2) + '%  (' + (Number(stockDetail.change) >= 0 ? '+' : '') + Number(stockDetail.change).toFixed(2) + ')' : ''">
        </span>
      </div>
      <img x-show="stockDetail?.chart_url" :src="stockDetail?.chart_url"
        class="w-full rounded-lg" alt="chart">
    </div>

    <!-- ヘッダー -->
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">📈 Stock Notifier</h1>
      <span x-text="pushStatus" class="text-sm px-3 py-1 rounded-full"
        :class="pushEnabled ? 'bg-green-800 text-green-200' : 'bg-gray-700 text-gray-400'"></span>
    </div>

    <!-- 通知許可ボタン -->
    <div x-show="!pushEnabled" class="bg-gray-800 rounded-xl p-4 space-y-3">
      <p class="text-sm text-gray-300">毎朝8時に株価プッシュ通知を受け取るには通知を許可してください。</p>
      <button @click="enablePush()"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded-lg transition">
        🔔 通知を許可する
      </button>
    </div>

    <!-- 銘柄リスト -->
    <div class="bg-gray-800 rounded-xl p-4 space-y-3">
      <h2 class="font-semibold text-gray-200">監視銘柄</h2>

      <div class="space-y-2">
        <template x-for="ticker in tickers" :key="ticker">
          <div class="flex items-center justify-between bg-gray-700 rounded-lg px-3 py-2">
            <span class="font-mono font-bold" x-text="ticker"></span>
            <button @click="removeTicker(ticker)"
              class="text-gray-400 hover:text-red-400 text-lg leading-none">✕</button>
          </div>
        </template>
      </div>

      <!-- 銘柄追加 -->
      <div class="relative pt-1" @click.outside="suggestions = []">
        <div class="flex gap-2">
          <input x-model="newTicker"
            @input.debounce.300ms="searchTickers()"
            @keyup.enter="addTicker()"
            @keydown.escape="suggestions = []"
            @keydown.arrow-down.prevent="focusSuggestion(0)"
            type="text" placeholder="例: AAPL / アップル"
            class="flex-1 bg-gray-700 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500"
            :disabled="saving">
          <button @click="addTicker()" :disabled="saving || !newTicker.trim()"
            class="bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
            追加
          </button>
        </div>
        <!-- 候補リスト -->
        <div x-show="suggestions.length > 0"
          class="absolute z-10 w-full mt-1 bg-gray-700 rounded-lg shadow-xl overflow-hidden">
          <template x-for="(s, i) in suggestions" :key="s.ticker">
            <button @click="selectSuggestion(s)"
              class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-600 text-left transition">
              <span class="font-mono font-bold text-green-400 w-16 shrink-0" x-text="s.ticker"></span>
              <span class="text-sm text-gray-300 truncate" x-text="s.name"></span>
            </button>
          </template>
        </div>
      </div>
    </div>

    <!-- 通知時刻 -->
    <div class="bg-gray-800 rounded-xl p-4 space-y-3">
      <h2 class="font-semibold text-gray-200">通知時刻</h2>
      <div class="flex items-center gap-3">
        <select x-model.number="notifyHour" @change="saveNotifyHour()"
          class="bg-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <template x-for="h in Array.from({length: 24}, (_, i) => i)" :key="h">
            <option :value="h" x-text="`${String(h).padStart(2,'0')}:00`"></option>
          </template>
        </select>
        <span class="text-sm text-gray-400">毎日この時刻に通知</span>
        <span x-show="savingHour" class="text-xs text-blue-400">保存中…</span>
      </div>
    </div>

    <!-- 操作ボタン -->
    <div class="grid grid-cols-2 gap-3">
      <button @click="saveConfig()" :disabled="saving"
        class="bg-green-700 hover:bg-green-600 disabled:opacity-40 text-white py-3 rounded-xl font-semibold transition">
        <span x-text="saving ? '保存中…' : '💾 保存'"></span>
      </button>
      <button @click="triggerNotify()" :disabled="notifying"
        class="bg-purple-700 hover:bg-purple-600 disabled:opacity-40 text-white py-3 rounded-xl font-semibold transition">
        <span x-text="notifying ? '送信中…' : '🚀 今すぐ通知'"></span>
      </button>
    </div>

    <!-- メッセージ -->
    <p x-show="message" x-text="message"
      class="text-center text-sm py-2 rounded-lg"
      :class="messageOk ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'"></p>

  </div>

  <script>
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    function app() {
      return {
        tickers: [],
        newTicker: '',
        suggestions: [],
        notifyHour: 8,
        savingHour: false,
        stockDetail: null,
        pushEnabled: false,
        pushStatus: '通知オフ',
        saving: false,
        notifying: false,
        message: '',
        messageOk: true,
        vapidKey: '',

        async init() {
          // 通知タップ時のURL params を解析
          const params = new URLSearchParams(location.search);
          if (params.get('ticker')) {
            this.stockDetail = {
              ticker: params.get('ticker'),
              price: params.get('price'),
              change_pct: params.get('change_pct'),
              change: params.get('change'),
              chart_url: params.get('chart_url'),
            };
            history.replaceState({}, '', '/');
          }

          // Service Worker 登録
          if ('serviceWorker' in navigator) {
            await navigator.serviceWorker.register('/sw.js');
          }
          // VAPID公開鍵取得
          const res = await fetch('/api/vapid-public-key');
          const data = await res.json();
          this.vapidKey = data.key;

          // 現在のPush登録状態確認
          const reg = await navigator.serviceWorker.ready;
          const sub = await reg.pushManager.getSubscription();
          if (sub) { this.pushEnabled = true; this.pushStatus = '通知オン'; }

          // 銘柄読み込み
          await this.loadConfig();
        },

        async loadConfig() {
          const res = await fetch('/api/config');
          const data = await res.json();
          this.tickers = data.tickers || [];
          this.notifyHour = data.notify_hour ?? 8;
        },

        async saveNotifyHour() {
          this.savingHour = true;
          try {
            const res = await fetch('/api/config/notify-hour', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ notify_hour: this.notifyHour }),
            });
            if (!res.ok) throw new Error(await res.text());
            this.showMessage(`通知時刻を ${String(this.notifyHour).padStart(2,'0')}:00 に設定しました`, true);
          } catch(e) {
            this.showMessage('保存に失敗しました: ' + e.message, false);
          } finally {
            this.savingHour = false;
          }
        },

        async searchTickers() {
          const q = this.newTicker.trim();
          if (!q) { this.suggestions = []; return; }
          try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            this.suggestions = data.results || [];
          } catch(e) { this.suggestions = []; }
        },


        selectSuggestion(s) {
          this.newTicker = s.ticker;
          this.suggestions = [];
          this.addTicker();
        },

        focusSuggestion(i) {
          this.$nextTick(() => {
            const btns = this.$el.querySelectorAll('[x-for] button');
            if (btns[i]) btns[i].focus();
          });
        },

        addTicker() {
          const t = this.newTicker.trim().toUpperCase();
          if (t && !this.tickers.includes(t)) {
            this.tickers.push(t);
          }
          this.newTicker = '';
          this.suggestions = [];
        },

        removeTicker(ticker) {
          this.tickers = this.tickers.filter(t => t !== ticker);
        },

        async saveConfig() {
          this.saving = true;
          try {
            const res = await fetch('/api/config/tickers', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tickers: this.tickers }),
            });
            if (!res.ok) throw new Error(await res.text());
            this.showMessage('保存しました', true);
          } catch (e) {
            this.showMessage('保存に失敗しました: ' + e.message, false);
          } finally {
            this.saving = false;
          }
        },

        async enablePush() {
          try {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
              this.showMessage('通知が許可されませんでした', false); return;
            }
            const reg = await navigator.serviceWorker.ready;
            const sub = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(this.vapidKey),
            });
            await fetch('/api/subscribe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ subscription: sub.toJSON() }),
            });
            this.pushEnabled = true;
            this.pushStatus = '通知オン';
            this.showMessage('通知を設定しました！', true);
          } catch (e) {
            this.showMessage('通知設定に失敗しました: ' + e.message, false);
          }
        },

        async triggerNotify() {
          this.notifying = true;
          try {
            const res = await fetch('/api/notify', { method: 'POST' });
            if (!res.ok) throw new Error(await res.text());
            this.showMessage('通知を送信しました（数分後に届きます）', true);
          } catch (e) {
            this.showMessage('送信に失敗しました: ' + e.message, false);
          } finally {
            this.notifying = false;
          }
        },

        showMessage(msg, ok) {
          this.message = msg; this.messageOk = ok;
          setTimeout(() => { this.message = ''; }, 4000);
        },
      };
    }
  </script>
</body>
</html>
